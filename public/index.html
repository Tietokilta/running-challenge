<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.png" type="image/png">
  <title>DNA x TiK Liikuntahaaste</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #fc4c02;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 16px;
      padding: 32px 16px;
    }

    .label {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.75;
    }

    .km-row {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .km {
      font-size: clamp(3.5rem, 12vw, 7rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .unit {
      font-size: 2.5rem;
      font-weight: 400;
      opacity: 0.8;
    }

    .since {
      font-size: 0.95rem;
      opacity: 0.65;
    }

    .updated {
      font-size: 0.8rem;
      opacity: 0.45;
      margin-top: 8px;
    }

    .progress-wrap {
      width: min(480px, 90vw);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .progress-bar-bg {
      width: 100%;
      height: 12px;
      background: rgba(255,255,255,0.25);
      border-radius: 6px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: white;
      border-radius: 6px;
      width: 0%;
      transition: width 1s ease;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      opacity: 0.75;
    }

    .leaderboard {
      width: min(480px, 90vw);
      margin-top: 8px;
    }

    .leaderboard-title {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.65;
      margin-bottom: 8px;
    }

    .search-input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 4px;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 0.85rem;
      outline: none;
      margin-bottom: 10px;
    }

    .search-input::placeholder { color: rgba(255,255,255,0.5); }
    .search-input:focus { border-color: rgba(255,255,255,0.6); }

    .category-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 12px;
    }

    .category-tab {
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 0.78rem;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.15s, background 0.15s;
    }

    .category-tab:hover { opacity: 0.9; }

    .category-tab.active {
      background: rgba(255,255,255,0.35);
      opacity: 1;
      font-weight: 600;
    }

    .athlete-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      font-size: 0.95rem;
    }

    .athlete-row:last-child { border-bottom: none; }

    .athlete-index {
      opacity: 0.5;
      font-size: 0.8rem;
      min-width: 2ch;
      text-align: right;
      margin-right: 8px;
      font-variant-numeric: tabular-nums;
    }

    .athlete-name { flex: 1; }

    .athlete-km {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <div class="label">DNA x TiK Liikuntahaaste</div>
  <div class="km-row">
    <span class="km" id="km">—</span>
    <span class="unit">km</span>
  </div>
  <div class="since">April 1 - June 1, 2026</div>
  <div class="progress-wrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <div class="progress-label">
      <span id="progress-text">0 / 30 000 km</span>
      <span id="progress-pct">0 %</span>
    </div>
  </div>
  <div class="updated" id="updated"></div>
  <div class="leaderboard" id="leaderboard" style="display:none">
    <div class="leaderboard-title">Leaderboard</div>
    <input type="text" class="search-input" id="search" placeholder="Search athletes...">
    <div class="category-tabs" id="category-tabs"></div>
    <div id="athlete-list"></div>
  </div>

  <script>
    const GOAL = 30000;
    const fmt = (n, d = 1) =>
      n.toLocaleString('fi-FI', { minimumFractionDigits: d, maximumFractionDigits: d });

    fetch('/api/stats')
      .then((r) => r.json())
      .then((data) => {
        if (data.error) {
          document.getElementById('km').textContent = '?';
          document.getElementById('updated').textContent = data.error;
          return;
        }

        const total = data.grandTotalKm;
        document.getElementById('km').textContent = fmt(total);

        const pct = Math.min((total / GOAL) * 100, 100);
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('progress-text').textContent = fmt(total) + ' / 30 000 km';
        document.getElementById('progress-pct').textContent = fmt(pct) + ' %';

        if (data.lastFetchAttempt) {
          document.getElementById('updated').textContent =
            'Updated ' + new Date(data.lastFetchAttempt).toLocaleString('fi-FI');
        }

        if (data.athletes && data.athletes.length > 0) {
          const tabs = document.getElementById('category-tabs');
          const list = document.getElementById('athlete-list');
          const search = document.getElementById('search');
          let currentAthletes = data.athletes;

          function renderAthletes(athletes) {
            const query = search.value.trim().toLowerCase();
            list.innerHTML = '';
            athletes.forEach((a, i) => {
              if (query && !a.name.toLowerCase().includes(query)) return;
              const row = document.createElement('div');
              row.className = 'athlete-row';
              row.innerHTML =
                `<span class="athlete-index">${i + 1}</span>` +
                `<span class="athlete-name">${a.name}</span>` +
                `<span class="athlete-km">${fmt(a.totalKm)} km</span>`;
              list.appendChild(row);
            });
          }

          for (const cat of data.categories) {
            const btn = document.createElement('button');
            btn.className = 'category-tab';
            btn.textContent = cat.name;
            btn.addEventListener('click', () => {
              tabs.querySelectorAll('.category-tab').forEach((b) => b.classList.remove('active'));
              btn.classList.add('active');
              currentAthletes = cat.athletes;
              renderAthletes(currentAthletes);
            });
            tabs.appendChild(btn);
          }

          search.addEventListener('input', () => renderAthletes(currentAthletes));

          tabs.firstChild.classList.add('active');
          renderAthletes(data.athletes);
          document.getElementById('leaderboard').style.display = 'block';
        }
      })
      .catch(() => {
        document.getElementById('km').textContent = '?';
        document.getElementById('updated').textContent = 'Could not load data';
      });
  </script>
</body>
</html>
